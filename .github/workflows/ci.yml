name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: implementations/typescript

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: implementations/typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Generate sample PDF
        run: pnpm run generate:sample

      - name: Test
        run: pnpm test
