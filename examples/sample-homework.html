<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAF - 数学</title>
<style>
@page {
  size: A4 portrait;
  margin: 0;
}

@media print {
  body {
    margin: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  width: 210mm;
  min-height: 297mm;
  background: #F8FAFC;
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
  color: #0F172A;
  position: relative;
  padding: 40pt;
}

.card {
  background: #FFFFFF;
  border: 1pt solid #E2E8F0;
  border-radius: 16pt;
  box-shadow: 0 2pt 8pt rgba(148, 163, 184, 0.15);
  width: 100%;
  padding: 24pt;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16pt;
}

.subject-pill {
  display: inline-block;
  background: #2563EB;
  color: #FFFFFF;
  font-size: 14pt;
  line-height: 1;
  padding: 8pt 16pt;
  border-radius: 9999pt;
  font-weight: 500;
}

.date-pill {
  display: inline-block;
  background: #F1F5F9;
  color: #334155;
  font-size: 12pt;
  line-height: 1;
  padding: 6pt 12pt;
  border-radius: 9999pt;
}

.divider {
  height: 1pt;
  background: #E2E8F0;
  margin-bottom: 20pt;
}

.content {
  font-size: 22pt;
  line-height: 1.5;
  color: #0F172A;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8pt;
  margin-top: 20pt;
}

.tag-chip {
  display: inline-block;
  background: #E0E7FF;
  color: #3730A3;
  font-size: 11pt;
  line-height: 1;
  padding: 5pt 10pt;
  border-radius: 9999pt;
}

.watermark {
  position: absolute;
  right: 40pt;
  bottom: 40pt;
  font-size: 10pt;
  color: #94A3B8;
  opacity: 0.5;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="subject-pill">数学</span>
    <span class="date-pill">2026年5月19日</span>
  </div>
  <div class="divider"></div>
  <div class="content">完成课本第45页第1、2题，请拍照上传。</div>
  <div class="tags"><span class="tag-chip">必做</span><span class="tag-chip">几何</span><span class="tag-chip">重难点</span></div>
</div>
<div class="watermark">使用 UAF v1.0 导出</div>
<template id="uaf-payload-csv" data-filename="uaf_payload.csv">subject,date,content,tags
数学,2026-05-19,完成课本第45页第1、2题，请拍照上传。,必做;几何;重难点
</template>
</body>
</html>
